<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión — MaJo Trends</title>
  <link rel="stylesheet" href="/auth.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#C9A96E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MaJo Trends" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark">MJ</div>
      MaJo Trends
    </div>

    <h1 class="auth-title">Bienvenida</h1>
    <p class="auth-subtitle">Accede a las tendencias de moda que mueven el mercado.</p>

    <div id="alert" class="alert"></div>

    <form id="login-form" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" name="email" placeholder="tu@email.com" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button class="btn-primary" type="submit" id="submit-btn">Ingresar</button>
    </form>

    <div class="auth-footer">
      ¿No tienes cuenta? <a href="/registro">Solicitar acceso</a>
    </div>
  </div>
</div>

<script>
  const form   = document.getElementById('login-form');
  const btn    = document.getElementById('submit-btn');
  const alert  = document.getElementById('alert');

  // Show error from URL param (e.g. rechazado, revocado)
  const params = new URLSearchParams(location.search);
  const errParam = params.get('error');
  if (errParam === 'rechazado') showAlert('Tu solicitud fue rechazada. Escríbenos a soporte.', 'error');
  if (errParam === 'revocado')  showAlert('Tu acceso fue revocado. Contacta a soporte.', 'error');

  form.addEventListener('submit', async e => {
    e.preventDefault();
    clearAlert();
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    const body = {
      email:    document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
    };

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) { showAlert(data.error, 'error'); return; }
      location.href = data.redirect || '/';
    } catch {
      showAlert('Error de conexión. Intenta de nuevo.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Ingresar';
    }
  });

  function showAlert(msg, type) {
    alert.textContent = msg;
    alert.className = `alert alert-${type} show`;
  }
  function clearAlert() {
    alert.className = 'alert';
  }
</script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});</script>
</body>
</html>
